{% include '_head.html' %}
{% include '_header.html' %}
<div class="container">
  <div class="jumbotron">
    <h1 class="text-center">Demographic Profile</h1>
    <p class="text-justify">Please provide the following demographic information. Your anonymity will be preserved.</p>
    <form method="post" id="form1" name="form1" action="{{ url_for('demographic') }}?id={{ request.args.get('id') }}&connect=true&demo=true">
      <input type="hidden" name="name" value="Guest">
      <div class="form-group"><label>Age:</label><input type="number" name="age" class="form-control" max="100" min="{{ session.get('age_restriction', 18) }}" required></div>
      <div class="form-group">
        <label>Gender:</label>
        <div class="radio"><label><input type="radio" name="gender" value="M" required>Male</label></div>
        <div class="radio"><label><input type="radio" name="gender" value="F">Female</label></div>
      </div>

      <div class="form-group">
        <label>Highest education level attained:</label>
        <div class="radio"><label><input type="radio" name="ed" value="High_School" required>High School</label></div>
        <div class="radio"><label><input type="radio" name="ed" value="Intermediate">Intermediate</label></div>
        <div class="radio"><label><input type="radio" name="ed" value="Undergraduate">Undergraduate</label></div>
        <div class="radio"><label><input type="radio" name="ed" value="Masters">Masters or equivalent</label></div>
        <div class="radio"><label><input type="radio" name="ed" value="phd">Ph.D. or equivalent</label></div>
        <div class="radio"><label><input type="radio" name="ed" value="Other">Other</label></div>
      </div>

      <div class="form-group"><label>Major / Specialization:</label><input type="text" name="major" class="form-control" required></div>

      <div class="form-group"><label>Occupation (If retired, state Retired and specify former occupation):</label><input type="text" name="occ" class="form-control" required></div>

      <div class="form-group"><label>E-Mail ID (strictly for payment purposes):</label><input id="email" type="email" name="email" class="form-control" required></div>

      <div class="form-group"><label>The city/town to which you belong to:</label><input type="text" name="city" class="form-control" required></div>

      <div class="form-group">
        <label>Do you currently live at the city/town where you belong to?</label>
        <div class="radio"><label><input type="radio" name="live" value="yes" required>Yes</label></div>
        <div class="radio"><label><input type="radio" name="live" value="no">No</label></div>
      </div>

      <div class="form-group"><label>If you marked "No" above, then mention the city/town where you currently live:</label><input type="text" name="liveno" class="form-control" value="fill-in" required></div>

      <div class="form-group">
        <label>How long have you lived in city/town where you currently reside?</label>
        <div class="radio"><label><input type="radio" name="livelong" value="Less than one year" required>Less than one year</label></div>
        <div class="radio"><label><input type="radio" name="livelong" value="1-5 Years">1-5 Years</label></div>
        <div class="radio"><label><input type="radio" name="livelong" value="5-10 Years">5-10 Years</label></div>
        <div class="radio"><label><input type="radio" name="livelong" value="10-15 Years">10-15 Years</label></div>
        <div class="radio"><label><input type="radio" name="livelong" value="15+ Years">15+ Years</label></div>
      </div>

      <input type="hidden" name="livereason" value="NULL">

      <div class="form-group">
        <label>Type of dwelling for your household:</label>
        <div class="radio"><label><input type="radio" name="dwell" value="Informal Building" required>Informal Building</label></div>
        <div class="radio"><label><input type="radio" name="dwell" value="Formal Building">Formal Building</label></div>
        <div class="radio"><label><input type="radio" name="dwell" value="Other">Other</label></div>
      </div>

      <div class="form-group"><label>If you marked "Other" above, please specify:</label><input type="text" name="dwellother" class="form-control" value="fill-in" required></div>

      <div class="form-group">
        <label>Your household size:</label>
        <div class="radio"><label><input type="radio" name="household" value="1 member only" required>1 member only</label></div>
        <div class="radio"><label><input type="radio" name="household" value="1-3 members">1-3 members</label></div>
        <div class="radio"><label><input type="radio" name="household" value="3-6 members">3-6 members</label></div>
        <div class="radio"><label><input type="radio" name="household" value="6-9 members">6-9 members</label></div>
        <div class="radio"><label><input type="radio" name="household" value="9 + members">9 + members</label></div>
      </div>

      <input type="hidden" name="owner" value="NULL">

      <div class="form-group">
        <label>What is your major source of income for the household?</label>
        <div class="radio"><label><input type="radio" name="source" value="Homemaker" required>Homemaker</label></div>
        <div class="radio"><label><input type="radio" name="source" value="Business (e.g., Shop)">Business</label></div>
        <div class="radio"><label><input type="radio" name="source" value="Government Job">Government Job</label></div>
        <div class="radio"><label><input type="radio" name="source" value="Retired and getting pension">Retired and getting pension</label></div>
        <div class="radio"><label><input type="radio" name="source" value="Other">Other</label></div>
      </div>

      <div class="form-group"><label>If you marked "Other" above, please specify:</label><input type="text" name="sourceother" class="form-control" value="fill-in" required></div>

      <div class="form-group">
        <label>What is the approximate range of the household income in INR per month?</label>
        <div class="radio"><label><input type="radio" name="income" value="less than 5,000" required>less than 5,000</label></div>
        <div class="radio"><label><input type="radio" name="income" value="5,000 - 25,000">5,000 - 25,000</label></div>
        <div class="radio"><label><input type="radio" name="income" value="25,000 - 50,000">25,000 - 50,000</label></div>
        <div class="radio"><label><input type="radio" name="income" value="50,000 - 75,000">50,000 - 75,000</label></div>
        <div class="radio"><label><input type="radio" name="income" value="75,000 - 1,00,000">75,000 - 1,00,000</label></div>
        <div class="radio"><label><input type="radio" name="income" value="More than 1,00,000">More than 1,00,000</label></div>
      </div>

      <div class="form-group">
        <label>Please describe your knowledge level about landslides:</label>
        <div class="radio"><label><input type="radio" name="know" value="No idea">No idea</label></div>
        <div class="radio"><label><input type="radio" name="know" value="Little understanding">Little understanding</label></div>
        <div class="radio"><label><input type="radio" name="know" value="Basic understanding">Basic understanding</label></div>
        <div class="radio"><label><input type="radio" name="know" value="Knowledgeable">Knowledgeable</label></div>
        <div class="radio"><label><input type="radio" name="know" value="Highly Knowledgeable" required>Highly Knowledgeable</label></div>
      </div>

      <div class="form-group">
        <label>Please describe your knowledge level about life, health, and property insurance against landslide disasters:</label>
        <div class="radio"><label><input type="radio" name="inslp" value="No idea">No idea</label></div>
        <div class="radio"><label><input type="radio" name="inslp" value="Little understanding">Little understanding</label></div>
        <div class="radio"><label><input type="radio" name="inslp" value="Basic understanding">Basic understanding</label></div>
        <div class="radio"><label><input type="radio" name="inslp" value="Knowledgeable">Knowledgeable</label></div>
        <div class="radio"><label><input type="radio" name="inslp" value="Highly Knowledgeable" required>Highly Knowledgeable</label></div>
      </div>

      <div class="form-group">
        <label>Have you ever purchased life, health, or property insurances against landslide disasters:</label>
        <div class="radio"><label><input type="radio" name="inspur" value="Yes">Yes</label></div>
        <div class="radio"><label><input type="radio" name="inspur" value="No">No</label></div>
      </div>

      <button type="submit" id="validate" class="btn btn-primary btn-lg">Submit</button>
    </form>
  </div>
</div>
{% include '_footer.html' %}
